<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR_GEN | Owen Kaider Projects</title>
    <style>
        /* Your original website styling */
        :root {
            --bg-base: #0a0a0a;
            --bg-panel: #141414;
            --text-main: #cccccc;
            --text-dim: #7a7a7a;
            --accent: #ff9d00;
            --border: #333333;
			--tip: #804f00;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        h1, h2, h3, .mono {
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

		.tip {
			color: var(--tip);
			font-size: 0.85rem;
			margin-top: 1rem;
		}

        a { color: var(--accent); text-decoration: none; }
        a:hover { background-color: var(--accent); color: var(--bg-base); }

        .wrapper { max-width: 900px; margin: 0 auto; padding: 2rem; }
        header { border-bottom: 2px solid var(--accent); padding-bottom: 0rem; margin-bottom: 2rem; }
        .sys-title { color: var(--accent); font-size: 0.9rem; margin-bottom: 1rem; display: block; }
        h1 { font-size: 2.5rem; color: #ffffff; margin-bottom: 1rem; }

        nav { margin-bottom: 3rem; display: flex; gap: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        nav a { border: 1px solid var(--accent); padding: 5px 15px; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.9rem; }

        section { margin-bottom: 4rem; }
        h2::before { content: "> "; color: var(--accent); }

        .log-entry {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            margin-top: 1.5rem; display: flex; flex-direction: column;
        }

        @media (min-width: 600px) { .log-entry { flex-direction: row; } }
        .log-details { padding: 1.5rem; width: 100%; box-sizing: border-box; }
        h3 { color: #ffffff; font-size: 1.2rem; margin-bottom: 0.5rem; }
        
        footer { border-top: 1px solid var(--border); padding-top: 2rem; margin-top: 4rem; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.85rem; color: var(--text-dim); }

        /* --- NEW STYLES FOR THE QR GENERATOR --- */
        input[type="text"] {
            background-color: var(--bg-base);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Borrowed from your lightbox button styles for UI consistency */
        .sys-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 25px;
            font-family: 'Consolas', monospace;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            display: inline-block;
        }

        .sys-btn:hover { 
            background: var(--accent); 
            color: var(--bg-base); 
        }

        /* QR Image output styling */
        #qr-container {
            display: none; /* Hidden until generated */
        }

        .qr-output-panel {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        #qr-image {
            max-width: 250px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(255, 157, 0, 0.1);
            background-color: #fff; /* QR codes need a white bg for scanners to read them */
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <span class="sys-title mono">SYS_TOOL // QR_GENERATOR</span>
            <h1>QR_Matrix_Encoder</h1>
        </header>

        <nav>
            <a href="https://owenprojectpage.github.io">&lt; RETURN_HOME</a>
        </nav>

        <section>
            <h2>Input Parameters</h2>
            <div class="log-entry">
                <div class="log-details">
                    <p class="mono" style="margin-bottom: 1rem; color: var(--text-dim);">Enter target URL or raw text string:</p>
                    
                    <input type="text" id="text-input" placeholder="https://..." autocomplete="off">
                    <button class="sys-btn" onclick="generateQR()">Execute_Encode()</button>
                </div>
            </div>
        </section>

        <section id="qr-container">
            <h2>Output Data</h2>
            <div class="log-entry qr-output-panel">
                <img id="qr-image" src="" alt="Generated QR Code">
                <p class="mono" style="margin-top: 1.5rem; color: var(--accent);">STATUS: ENCODING_COMPLETE</p>
                <p class="tip">Right-click image to save matrix locally.</p>
            </div>
        </section>

        <footer>
            > END_OF_LOG
						<br><br>
						> CONTACT: owenkaider@outlook.com
        </footer>
    </div>

    <script>
        function generateQR() {
            const input = document.getElementById('text-input').value;
            const qrContainer = document.getElementById('qr-container');
            const qrImage = document.getElementById('qr-image');

            if (input.trim() === '') {
                alert("ERR: Input parameter cannot be null.");
                return;
            }

            // Using the goqr API to generate the image
            // Adding a small margin and setting size
            const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=2&data=${encodeURIComponent(input)}`;
            
            qrImage.src = apiUrl;
            qrContainer.style.display = "block";
            
            // Scroll to the generated code
            setTimeout(() => {
                qrContainer.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // Allow pressing "Enter" to trigger the button
        document.getElementById("text-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                generateQR();
            }
        });
    </script>

</body>
</html>
